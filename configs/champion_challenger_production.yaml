# Champion/Challenger - Production Configuration
# Used when running comparison in production context

run_name: "champion_challenger_production_{date}_{time}"

enable_cache: false

tags:
  - "production"
  - "champion_challenger"
  - "release"

settings:
  docker:
    python_package_installer: uv
    requirements: "requirements.txt"
    required_integrations:
      - sklearn
  resources:
    cpu_count: 4
    memory: 8GB
